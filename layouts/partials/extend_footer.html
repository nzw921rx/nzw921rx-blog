{{- if or (.Param "mermaid") (.HasShortcode "mermaid") }}
<script type="module">
    if (!window.__nzwMermaidStarted) {
        window.__nzwMermaidStarted = true;
        const { default: mermaid } = await import("https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs");

        const isDarkTheme = () =>
            document.body.classList.contains("dark") ||
            document.documentElement.dataset.theme === "dark" ||
            window.matchMedia("(prefers-color-scheme: dark)").matches;

        mermaid.initialize({
            startOnLoad: false,
            theme: isDarkTheme() ? "dark" : "default"
        });

        const mermaidBlocks = document.querySelectorAll("pre > code.language-mermaid, pre > code[data-lang='mermaid']");
        mermaidBlocks.forEach((codeBlock, index) => {
            const source = codeBlock.textContent;
            const container = document.createElement("div");
            container.className = "mermaid";
            container.id = `mermaid-${index}`;
            container.textContent = source;
            codeBlock.parentElement.replaceWith(container);
        });

        if (document.querySelector(".mermaid")) {
            await mermaid.run({ querySelector: ".mermaid" });
        }
    }
</script>
{{- end }}
