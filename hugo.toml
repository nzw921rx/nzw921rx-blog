baseURL = "https://nzw921rx.github.io/"
languageCode = "zh-cn"
title = "Niu Zhiwei Blog"
theme = "PaperMod"

[params]
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  defaultTheme = "auto"

  env = "production"

  [params.homeInfoParams]
    Eyebrow = "Personal Tech Blog"
    Title = "Niu Zhiwei"
    Content = "记录 Java、Go、大数据与 AI 工程实践。关注数据处理、系统设计与长期可复用的技术经验。"
    Tags = ["Java", "Go", "Flink", "Spark", "SeaTunnel", "AI Engineering"]
    AlignSocialIconsTo = "left"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/nzw921rx"

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Categories"
    url = "/categories/"
    weight = 2
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 3
