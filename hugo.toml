baseURL = "https://nzw921rx.github.io/nzw921rx-blog/"
locale = "zh-CN"
title = "Niu Zhiwei 的个人技术博客"
theme = "PaperMod"
description = "Niu Zhiwei 的个人技术博客"

[params]
  author = "Niu Zhiwei"
  description = "Niu Zhiwei 的个人技术博客"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "auto"
  env = "production"
  DateFormat = "2006 年 1 月 2 日"
  mainSections = ["posts"]
  disableThemeToggle = false
  ShowFullTextinRSS = true

  [params.homeInfoParams]
    Title = "把技术实践，整理成长期资产。"
    Content = "你好，我是 Niu Zhiwei。这里记录 Web 开发、后端工程、工具效率和个人项目复盘。慢慢写，长期迭代。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/nzw921rx"

[menu]
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 2
  [[menu.main]]
    name = "关于"
